# Match 5 — luck-based tabletop reveal game
# Data folder: plugins/GenesiCore/games/Match5/

# First player to find this many of their mob wins
match-to: 5

# How many of each mob are hidden on the board (rest are blanks)
copies-per-mob: 8

# Default board size for new arenas (override per-arena with /m5admin setsize)
board:
  columns: 6
  rows: 6
  cell-size: 1
  gap: 0

# Finding your mob keeps your turn (set false for strict alternate turns)
keep-turn-on-hit: true

lobby-countdown-seconds: 5
start-countdown-seconds: 3

# Optional entry fee charged on join (Vault when available)
entry-fee: 0.0

# Arcade points awarded at end (stored in points.yml)
points-win: 3
points-draw: 1

# Who goes first: seat-a | seat-b | random
first-turn: seat-a

teleport-on-end: true

# ---------------------------------------------------------------------------
# Sidebar (right-hand scoreboard) — your mob + scores
# ---------------------------------------------------------------------------
sidebar:
  enabled: true
  title: "&6Match 5"

# ---------------------------------------------------------------------------
# Board visuals — ItemDisplay entities (lighter than MapView canvases)
# Hidden tiles use a map item for the "reveal" look without map renderer cost.
# ---------------------------------------------------------------------------
displays:
  enabled: true
  scale: 0.85
  y-offset: 0.55
  # FIXED | CENTER | VERTICAL | HORIZONTAL
  billboard: FIXED
  hidden:
    material: MAP
    item-model: ""
    custom-model-data: 0
    itemsadder-id: ""
    display-name: "&7?"
  blank:
    material: LIGHT_GRAY_CONCRETE
    item-model: ""
    custom-model-data: 0
    itemsadder-id: ""
    display-name: "&8Empty"
  mob:
    # When true, uses each player's assigned spawn egg material
    use-spawn-egg: true
    material: PIG_SPAWN_EGG
    item-model: ""
    custom-model-data: 0
    itemsadder-id: ""
    display-name: ""

# Mob pool — two distinct picks assigned at match start
mobs:
  - material: PIG_SPAWN_EGG
    label: Pig
  - material: COW_SPAWN_EGG
    label: Cow
  - material: SHEEP_SPAWN_EGG
    label: Sheep
  - material: CHICKEN_SPAWN_EGG
    label: Chicken
  - material: WOLF_SPAWN_EGG
    label: Wolf
  - material: CAT_SPAWN_EGG
    label: Cat
  - material: FOX_SPAWN_EGG
    label: Fox
  - material: RABBIT_SPAWN_EGG
    label: Rabbit
  - material: HORSE_SPAWN_EGG
    label: Horse
  - material: PANDA_SPAWN_EGG
    label: Panda

reward:
  deposit-to-vault: false
  # Placeholders: {player} {uuid} {points} {arena} {result}
  commands: []

