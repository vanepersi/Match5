# Match 5 — luck-based tabletop reveal
# Data folder: plugins/GenesiCore/games/Match5/
#
# Find all {match-to} of your sidebar icon. Each click costs 1 chance.

match-to: 5
chances: 10
# How many of each icon are hidden (must be >= match-to)
copies-per-icon: 5

board:
  columns: 6
  rows: 6
  cell-size: 1
  gap: 0

# Finding your icon keeps your turn
keep-turn-on-hit: true

lobby-countdown-seconds: 5
start-countdown-seconds: 3
entry-fee: 0.0
points-win: 3
points-draw: 1
first-turn: seat-a
teleport-on-end: true

sidebar:
  enabled: true
  title: "&6Match 5"

# ---------------------------------------------------------------------------
# Flat ItemDisplays on top of each block (not upright signs)
# ---------------------------------------------------------------------------
displays:
  enabled: true
  scale: 0.9
  # Just above the block top face
  y-offset: 1.02
  hidden:
    material: PAPER
    itemsadder-id: ""
  blank:
    material: LIGHT_GRAY_CONCRETE
    itemsadder-id: ""

# Test icon pool — 5 genesicore ItemsAdder icons (two are picked per match)
icons:
  - itemsadder-id: genesicore:asset1734
    label: Gem
    fallback: PAPER
  - itemsadder-id: genesicore:asset1784
    label: Market Gem
    fallback: PAPER
  - itemsadder-id: genesicore:asset1964
    label: Blue Coin
    fallback: PAPER
  - itemsadder-id: genesicore:asset1716
    label: Fall Token
    fallback: PAPER
  - itemsadder-id: genesicore:asset1908
    label: Currency
    fallback: PAPER

reward:
  deposit-to-vault: false
  commands: []

messages:
  prefix: "&8[&6Match 5&8] &r"
  no-permission: "&cYou don't have permission."
  players-only: "&cOnly players can use this command."
